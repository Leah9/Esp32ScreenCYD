esphome:
  name: esp32screen
  friendly_name: ESP32Screen
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret esp32screen__encryption_key

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Various ways to configure fonts
#font:
    # gfonts://family[@weight]
  #- file: "gfonts://Roboto"
  #  id: roboto_20
  #  size: 20

globals:
  - type: float
    id: caseTemp

font:
  - file:
      url: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
      type: web
    id: mdi_icons_24
    size: 24
    glyphs: [
      "\U000F050F",  # Thermometer
      "\U000F0210",  # Fan
      ]
  
  
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: mipi_spi
    spi_id: tft
    id: display_mipi_spi_1
    model: ILI9342
    dc_pin: GPIO2
    auto_clear_enabled: false
    update_interval: never
    #show_test_card: true
    release_device: false
    #update_interval: 1s
    invert_colors: false
    cs_pin: GPIO15
    color_order: RGB
    #lambda: |-
      #// Write your display rendering code here
      
      #     it.printf(0, 10, id(roboto_20), "Fan 1: ");
      #// For example, draw a line from [x=0,y=0] to [x=50,y=50]
      #// it.line(0, 0, 50, 50);
      
touchscreen:
  platform: xpt2046
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 339
    x_max: 3757
    y_min: 338
    y_max: 3775
  transform:
    swap_xy: true
    mirror_x: true
    mirror_y: true
#  on_touch:
#    - lambda: |-
#          ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
#              touch.x,
#              touch.y,
#              touch.x_raw,
#              touch.y_raw
#              );

