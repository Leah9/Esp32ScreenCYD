# Former led pin in the display config
output:
  - platform: ledc
    pin: 21
    id: former_led_pin

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: former_led_pin
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

one_wire:
  - platform: gpio
    pin: GPIO22
    id: one_wire_gpio_1

sensor:
  - platform: dallas_temp
    name: case
    one_wire_id: one_wire_gpio_1
    id: sensor_dallas_temp_1
    on_value:
        then:
          - lvgl.label.update:
              id: sensorLabel1
              text:
                format: "Case : %.1f"
                args: [ 'id(sensor_dallas_temp_1).state' ] 
