esphome:
  name: esp32screen
  friendly_name: ESP32Screen
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret esp32screen__encryption_key

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Various ways to configure fonts
font:
    # gfonts://family[@weight]
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
  
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: mipi_spi
    spi_id: tft
    id: display_mipi_spi_1
    model: ILI9342
    dc_pin: GPIO2
    auto_clear_enabled: true
    show_test_card: true
    release_device: false
    update_interval: 1s
    invert_colors: false
    cs_pin: GPIO15
    color_order: RGB
    #lambda: |-
      #// Write your display rendering code here
      
      #     it.printf(0, 10, id(roboto_20), "Fan 1: ");
      #// For example, draw a line from [x=0,y=0] to [x=50,y=50]
      #// it.line(0, 0, 50, 50);
      
    

#lvgl:

# Former led pin in the display config
output:
  - platform: ledc
    pin: 21
    id: former_led_pin

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: former_led_pin
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON
  

